<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomZero | Offline</title>
  <meta name="theme-color" content="#101828" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #101828;
      --text: #d9e2ff;
      --muted: #9ab0e5;
      --accent: #6ea8ff;
      --border: #223154;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, #182544 0, var(--bg) 55%);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
      padding: 20px;
    }
    .card {
      width: min(680px, 100%);
      background: linear-gradient(180deg, #111a2f, var(--panel));
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px; font-size: 1.4rem; }
    p { margin: 8px 0; color: var(--muted); line-height: 1.5; }
    code {
      background: #0c162d;
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 6px;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>RoomZero is offline</h1>
    <p>You can still open the installed shell, but live API actions need network or local server access.</p>
    <p>When your connection returns, reopen <code>/ui</code> to continue full testing workflows.</p>
    <p>For Android install: open RoomZero in Chrome and use “Add to Home Screen”.</p>
  </main>
</body>
</html>
