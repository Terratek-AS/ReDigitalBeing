name: Deploy RoomZero UI to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "RoomZero/app/static/**"
      - ".github/workflows/deploy-pages.yml"
      - "RoomZero/app/static/config.js"
      - "RoomZero/app/static/config.example.js"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-roomzero
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Pages artifact
        run: |
          rm -rf out
          mkdir -p out
          cp -r RoomZero/app/static/* out/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
