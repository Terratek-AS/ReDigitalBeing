name: CI

'on':
  push:
    branches: ["main", "develop", "blackboxai/**"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-validate:
    name: Lint and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: RoomZero/requirements.txt

      - name: Install Python dependencies
        working-directory: RoomZero
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python compile check
        run: python -m compileall -q RoomZero

      - name: pip dependency check
        working-directory: RoomZero
        run: pip check

      - name: Run pytest
        working-directory: RoomZero
        run: python -m pytest -q

      - name: Run ruff if available
        working-directory: RoomZero
        run: |
          python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('ruff') else 1)" && ruff check . || echo "ruff not installed, skipping"

      - name: Run npm lint if package.json has lint script
        shell: bash
        run: |
          if [ -f package.json ] && node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.lint?0:1)"; then
            npm run lint
          elif [ -f RoomZero/package.json ] && node -e "const p=require('./RoomZero/package.json'); process.exit(p.scripts&&p.scripts.lint?0:1)"; then
            cd RoomZero
            npm run lint
          else
            echo "No package.json lint script found, skipping npm lint"
          fi

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config

  package-smoke:
    name: Packaging smoke (Windows)
    runs-on: windows-latest
    needs: lint-and-validate

    defaults:
      run:
        working-directory: RoomZero

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: RoomZero/requirements.txt

      - name: Bootstrap install with builder deps
        shell: pwsh
        run: .\install.ps1 -WithBuilder

      - name: Build executable (PyInstaller)
        shell: pwsh
        run: .\build_installer.ps1

      - name: Validate dist artifact exists
        shell: pwsh
        run: |
          if (-not (Test-Path ".\dist\RoomZero.exe")) { throw "dist\RoomZero.exe missing" }
          Write-Host "Found .\dist\RoomZero.exe"
