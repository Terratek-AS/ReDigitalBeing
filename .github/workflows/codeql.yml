name: CodeQL

on:
  push:
    branches: ["main", "develop", "blackboxai/**"]
  pull_request:
    branches: ["main", "develop", "blackboxai/**"]
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r RoomZero/requirements.txt

      - name: Install Node dependencies
        if: matrix.language == 'javascript' && (exists('package.json') || exists('RoomZero/package.json'))
        run: |
          if [ -f package.json ]; then npm ci; elif [ -f RoomZero/package.json ]; then (cd RoomZero && npm ci); else echo "no package.json found"; fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
